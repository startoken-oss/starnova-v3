<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>STARNOVA</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
  
  <style>
    .gateway {
      position: relative !important;
      z-index: 9999 !important;
    }
    #enterBtn {
      cursor: pointer !important;
      pointer-events: auto !important;
    }
  </style>
</head>

<body>

  <canvas id="starfield"></canvas>

  <div class="source-light"></div>

  <section class="gateway">

    <img src="aleph.png"
         class="aleph"
         alt="Aleph">

    <h1>ALEIGHA</h1>

    <h2>STARNOVA</h2>

    <p class="tagline">
      The Constellation Map of STAR ERC TOKEN
    </p>

    <a href="https://etherscan.io/token/0x15761A8A54B237A23f36a4AB5Ed23ecba5F7259A" target="_blank" rel="noopener noreferrer">
      <button id="enterBtn" onclick="window.open('https://etherscan.io/token/0x15761A8A54B237A23f36a4AB5Ed23ecba5F7259A', '_blank');">
        ENTER THE CONSTELLATION
      </button>
    </a>

    <p class="verse">
      Where your treasure is,
      there your heart will be also.
    </p>

  </section>

  <section class="constellation hidden">

    <div class="node music">
      THE MUSIC
    </div>

  </section>

  <script src="stars.js"></script>

</body>
</html>
